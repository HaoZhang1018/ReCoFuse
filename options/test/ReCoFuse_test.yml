name: ReCoFuse
suffix_X: ~  # add suffix to saved images
suffix_Y: ~  # add suffix to saved images
suffix_Fuse: ~  # add suffix to saved images
model: Dual_latent_diffusion
gpu_ids: [0]

sde:
  max_sigma: 50
  T: 100
  sample_T: 100
  schedule: cosine # linear, cosine
  eps: 0.005

datasets:
  test:
    name: test
    mode: LQGTXY
    dataroot_GT_X: datasets/test/MFNet/vi/HQ
    dataroot_LQ_X: datasets/test/MFNet/vi/LQ
    dataroot_GT_Y: datasets/test/MFNet/ir/HQ
    dataroot_LQ_Y: datasets/test/MFNet/ir/LQ
    save_HQ: False
    save_LQ: False
    evaluate_against_LQ: False

# #### network structures
network_G:
  which_model: DiM
  setting:
    img_channel: 8
    width: 64
    enc_blk_nums: [1, 1, 1, 28]
    middle_blk_num: 1
    dec_blk_nums: [1, 1, 1, 1]

network_L:
  which_model: UNet
  setting:
    in_ch: 3
    out_ch: 3
    ch: 8
    ch_mult: [4, 8, 8, 16]
    embed_dim: 8

network_F:
  which_model: TIM
  setting:
    in_channels: 16
    model_channels: 64

#### path
path:
  pretrain_model_G: pretrained_models/ReCoFuse_G.pth
  pretrain_model_F: pretrained_models/ReCoFuse_F.pth
  pretrain_model_VIS: ~
  pretrain_model_IR: ~
  pretrain_model_L: pretrained_models/latent-AE-XY.pth
