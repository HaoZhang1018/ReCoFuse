#### general settings
name: ReCoFuse
use_tb_logger: true
model: Dual_latent_diffusion
gpu_ids: [0,1]

sde:
  max_sigma: 50
  T: 100
  sample_T: 100
  schedule: cosine # linear, cosine
  eps: 0.005

#### datasets
datasets:
  train:
    name: Train_Dataset
    mode: LQGTXY
    dataroot_GT_X: dataset/train/vi/HQ
    dataroot_LQ_X: dataset/train/vi/LQ
    dataroot_GT_Y: dataset/train/ir/HQ
    dataroot_LQ_Y: dataset/train/ir/LQ
    use_shuffle: true
    n_workers: 8  # per GPU
    batch_size: 16
    GT_size: 480
    LQ_size: 480
    use_flip: true
    use_rot: true
    use_swap: true
    color: RGB
  val:
    name: Val_Dataset
    mode: LQGTXY
    dataroot_GT_X: dataset/test/MFNet/vi/HQ
    dataroot_LQ_X: dataset/test/MFNet/vi/LQ
    dataroot_GT_Y: dataset/test/MFNet/ir/HQ
    dataroot_LQ_Y: dataset/test/MFNet/ir/LQ
    color: RGB

network_G:
  which_model: DiM
  setting:
    img_channel: 8
    width: 64
    enc_blk_nums: [1, 1, 1, 28]
    middle_blk_num: 1
    dec_blk_nums: [1, 1, 1, 1]

network_F:
  which_model: TIM
  setting:
    in_channels: 16
    model_channels: 64

network_L:
  which_model: UNet
  setting:
    in_ch: 3
    out_ch: 3
    ch: 8
    ch_mult: [4, 8, 8, 16]
    embed_dim: 8

#### path
path:
  pretrain_model_G: ~
  pretrain_model_F: ~
  pretrain_model_VIS: pretrained_models/VIS.pth
  pretrain_model_IR: pretrained_models/IR.pth
  strict_load: true
  resume_state: ~
  pretrain_model_L: pretrained_models/latent-AE-XY.pth

#### training settings: learning rate scheme, loss
train:
  optimizer: Lion
  lr_G: !!float 3e-5
  lr_scheme: TrueCosineAnnealingLR
  beta1: 0.9
  beta2: 0.99
  niter: 200000
  warmup_iter: -1  # no warm up
  lr_steps: [60000, 120000, 180000]
  lr_gamma: 0.5
  eta_min: !!float 1e-7

  # criterion
  is_weighted: False
  loss_type: l1
  weight: 1.0

  manual_seed: 0
  val_freq: !!float 200

#### logger
logger:
  print_freq: 200
  save_checkpoint_freq: !!float 1e4
